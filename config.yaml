# ──────────────────────────────────────────────
# PosiSense 全局配置
# ──────────────────────────────────────────────

# 仓位配置
position:
  max: 100
  min: 0
  step: 10

# 四层权重（合计 = 1.0）
weights:
  global_sentiment: 0.30
  global_sectors:   0.20
  ashare_sentiment: 0.30
  ashare_sectors:   0.20

# VIX 熔断阈值
vix:
  safe:    20
  caution: 25
  danger:  30

# ── 全球行业 ETF（yfinance）──────────────────
global_sector_tickers:
  半导体: "^SOX"
  科技:   "XLK"
  能源:   "XLE"
  金融:   "XLF"
  黄金:   "GLD"
  原油:   "USO"
  消费:   "XLP"
  医疗:   "XLV"

global_sector:
  strong_threshold:  0.005
  weak_threshold:   -0.005

# ── A股行业板块（iFinD 同花顺行业指数）───────
# 代码来自同花顺行业分类，可按需增减
ashare_sector:
  strong_threshold:  0.5     # 涨幅 > 0.5% 视为强势
  weak_threshold:   -0.5     # 跌幅 < -0.5% 视为弱势
  top_n: 5

ashare_sector_codes:
  电子:     "881121"
  计算机:   "881122"
  通信:     "881123"
  医药生物: "881124"
  食品饮料: "881125"
  银行:     "881131"
  非银金融: "881132"
  房地产:   "881133"
  有色金属: "881141"
  化工:     "881142"
  钢铁:     "881143"
  建筑材料: "881144"
  机械设备: "881151"
  电力设备: "881152"
  汽车:     "881155"
  家用电器: "881156"
  农林牧渔: "881161"
  交通运输: "881162"
  公用事业: "881163"
  传媒:     "881171"

# ── A股情绪指数（iFinD）──────────────────────
ashare_indices:
  上证指数: "000001.SH"
  深证成指: "399001.SZ"
  创业板指: "399006.SZ"

# 历史记录
history:
  enabled: true
  path: "history.jsonl"

# 飞书推送（webhook 放 GitHub Secrets: FEISHU_WEBHOOK）
feishu:
  enabled: true
