name: Daily PosiSense Report

on:
  schedule:
    # 北京时间 9:30 = UTC 1:30（周一到周五）
    - cron: "30 1 * * 1-5"
  workflow_dispatch:  # 支持手动触发

jobs:
  run-posisense:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 🚀 Run PosiSense
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: python main.py

      - name: 💾 Commit history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add history.jsonl || true
          git diff --cached --quiet || git commit -m "📊 daily report $(date +%Y-%m-%d)"
          git push || true
