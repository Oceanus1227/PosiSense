name: PosiSense Daily Run

on:
  schedule:
    - cron: '0 23 * * 0-4'  # UTC 23:00 = 北京时间 07:00（周一至周五）
  workflow_dispatch:          # 允许手动触发

jobs:
  run-posisense:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 拉取代码
        uses: actions/checkout@v4

      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 安装依赖
        run: pip install -r requirements.txt

      - name: 🚀 运行 PosiSense
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}  # ← 新增
        run: python main.py
